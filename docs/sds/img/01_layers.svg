<svg xmlns="http://www.w3.org/2000/svg" width="940" height="600" viewBox="0 0 940 600" font-family="Arial, sans-serif">
  <rect width="940" height="600" fill="#ffffff"/>
  <text x="470" y="38" font-size="22" font-weight="bold" fill="#1e293b" text-anchor="middle">Слоевита архитектура (Clean Architecture)</text>

  <!-- API layer -->
  <rect x="60" y="70" width="600" height="92" rx="10" fill="#eff4ff" stroke="#1a56db" stroke-width="2"/>
  <text x="80" y="98" font-size="17" font-weight="bold" fill="#1a56db">SportActivityOrganizer.API — Презентациски слој</text>
  <text x="80" y="124" font-size="13" fill="#334155">Контролери (REST) · Middleware за грешки · JWT автентикација · Swagger</text>
  <text x="80" y="146" font-size="13" fill="#334155">CORS · Rate limiting · Health check · Конфигурација (Program.cs)</text>

  <!-- Application layer -->
  <rect x="60" y="200" width="600" height="110" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="80" y="228" font-size="17" font-weight="bold" fill="#047857">Application — Слој на апликациска логика (Use Cases)</text>
  <text x="80" y="254" font-size="13" fill="#334155">Сервиси: Auth, User, Sport, Event, EventApplication, Comment,</text>
  <text x="80" y="274" font-size="13" fill="#334155">Rating, Notification, Dashboard, Admin</text>
  <text x="80" y="296" font-size="13" fill="#334155">Интерфејси · DTOs · AutoMapper профили</text>

  <!-- Domain layer -->
  <rect x="60" y="348" width="600" height="92" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="2"/>
  <text x="80" y="376" font-size="17" font-weight="bold" fill="#b45309">Domain — Доменски слој</text>
  <text x="80" y="402" font-size="13" fill="#334155">Ентитети (User, SportEvent, EventApplication, ...) · Енумерации</text>
  <text x="80" y="424" font-size="13" fill="#334155">Заеднички бази (BaseEntity, BaseAuditableEntity) · Без надворешни зависности</text>

  <!-- Infrastructure column -->
  <rect x="700" y="70" width="180" height="370" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="790" y="98" font-size="15" font-weight="bold" fill="#334155" text-anchor="middle">Infrastructure</text>
  <text x="790" y="116" font-size="12" fill="#64748b" text-anchor="middle">(адаптери)</text>
  <text x="716" y="150" font-size="12.5" fill="#334155">EF Core DbContext</text>
  <text x="716" y="174" font-size="12.5" fill="#334155">Repository / UnitOfWork</text>
  <text x="716" y="198" font-size="12.5" fill="#334155">TokenService (JWT)</text>
  <text x="716" y="222" font-size="12.5" fill="#334155">EmailService (SendGrid)</text>
  <text x="716" y="246" font-size="12.5" fill="#334155">EventBackgroundService</text>
  <text x="716" y="270" font-size="12.5" fill="#334155">DataSeeder · Migracii</text>
  <line x1="716" y1="298" x2="864" y2="298" stroke="#cbd5e1" stroke-width="1"/>
  <text x="716" y="322" font-size="11.5" fill="#64748b">Npgsql · PostgreSQL</text>
  <text x="716" y="342" font-size="11.5" fill="#64748b">провајдер</text>

  <!-- dependency arrows -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#475569"/>
    </marker>
  </defs>
  <line x1="360" y1="162" x2="360" y2="198" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="360" y1="310" x2="360" y2="346" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="700" y1="255" x2="662" y2="255" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <text x="372" y="186" font-size="11.5" fill="#64748b">зависи од</text>
  <text x="372" y="334" font-size="11.5" fill="#64748b">зависи од</text>
  <text x="540" y="248" font-size="11.5" fill="#64748b">имплементира интерфејси</text>

  <text x="60" y="478" font-size="12.5" fill="#64748b">Насока на зависности: навнатре — кон Domain. Domain не зависи од ниту еден друг слој, што овозможува</text>
  <text x="60" y="498" font-size="12.5" fill="#64748b">тестирање на апликациската логика изолирано од инфраструктурата.</text>
</svg>
